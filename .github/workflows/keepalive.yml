name: Keep scheduled workflows alive

# GitHub disables cron workflows after 60 days without repository activity.
# seen.db commits usually count as activity, but they only happen when the
# bot is actually used — go quiet for two months and the /news poller dies
# silently. This monthly empty commit guarantees the repo never goes stale.

on:
  schedule:
    - cron: "0 6 1 * *"   # 06:00 UTC on the 1st of every month
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: seen-db          # don't race the workflows that push seen.db
  cancel-in-progress: false

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Empty keep-alive commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit --allow-empty -m "Keep-alive: prevent scheduled workflow auto-disable [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push
