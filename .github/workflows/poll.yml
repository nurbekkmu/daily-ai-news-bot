name: Poll for On-Demand News Commands

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch: {}       # allows manual "Run workflow" trigger

permissions:
  contents: write

# Shared group with daily.yml — both commit seen.db, so they must never run
# at the same time (a simultaneous push would be rejected and lose state).
concurrency:
  group: seen-db
  cancel-in-progress: false

jobs:
  poll:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Poll Telegram for /news command or button tap
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python poll_telegram.py

      - name: Commit updated seen.db
        if: always()   # persist processed update_id even if the pipeline step failed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.db
          git diff --staged --quiet || git commit -m "Update seen.db [skip ci]"
          git pull --rebase origin ${{ github.ref_name }}
          git push
