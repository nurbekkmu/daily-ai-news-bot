name: AI News Digest (manual only)

# On-demand-only mode: no daily cron. News is delivered when you press the
# "Get Latest News" button or send /news (handled by poll.yml every 5 minutes).
# This workflow remains as a manual fallback via the Actions tab "Run workflow".
on:
  workflow_dispatch: {}

permissions:
  contents: write

# Shared group with poll.yml — both commit seen.db, so they must never run
# at the same time (a simultaneous push would be rejected and lose state).
concurrency:
  group: seen-db
  cancel-in-progress: false

jobs:
  run-digest:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest pipeline
        env:
          GEMINI_API_KEYS: ${{ secrets.GEMINI_API_KEYS }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python main.py

      - name: Commit updated seen.db
        if: always()   # persist dedup state even if the pipeline step failed partway
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.db
          git diff --staged --quiet || git commit -m "Update seen.db [skip ci]"
          # -X theirs: seen.db is binary, so a rebase conflict can't be merged.
          # If the remote moved (e.g. a manual push), keep OUR run's seen.db —
          # it has the newest state.
          git pull --rebase -X theirs origin ${{ github.ref_name }}
          git push
